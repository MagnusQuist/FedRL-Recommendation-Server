# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  DEVELOPMENT ONLY                                                          ║
# ║                                                                            ║
# ║  Runs a local PostgreSQL container and bind-mounts the source for live     ║
# ║  reload.  Do NOT use this in production — see docker-compose.prod.yml.     ║
# ║                                                                            ║
# ║  Usage:                                                                    ║
# ║    docker compose -f docker-compose.dev.yml up                             ║
# ║                                                                            ║
# ║  First-time seed (after containers are running):                           ║
# ║    docker compose -f docker-compose.dev.yml exec server \                  ║
# ║        python scripts/seed_all.py                                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17.6-alpine
    container_name: fedrl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fedrl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fedrl}
      POSTGRES_DB: ${POSTGRES_DB:-fedrl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fedrl} -d ${POSTGRES_DB:-fedrl}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fedrl_network

  # ── FastAPI server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: runtime
    container_name: fedrl_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fedrl}:${POSTGRES_PASSWORD:-fedrl}@postgres:5432/${POSTGRES_DB:-fedrl}
      CATALOGUE_VERSION: ${CATALOGUE_VERSION:-2026-01-01T00:00:00Z}
      SQL_ECHO: ${SQL_ECHO:-false}
      AUTO_CREATE_MODELS: "true"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    ports:
      - "8000:8000"
    networks:
      - fedrl_network
    volumes:
      - .:/app

volumes:
  postgres_data:

networks:
  fedrl_network:
    driver: bridge
