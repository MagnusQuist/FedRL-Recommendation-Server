services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fedrl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fedrl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fedrl}
      POSTGRES_DB: ${POSTGRES_DB:-fedrl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fedrl} -d ${POSTGRES_DB:-fedrl}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fedrl_network

  # ── FastAPI server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: runtime
    container_name: fedrl_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fedrl}:${POSTGRES_PASSWORD:-fedrl}@postgres:5432/${POSTGRES_DB:-fedrl}
      CATALOGUE_VERSION: ${CATALOGUE_VERSION:-2026-01-01T00:00:00Z}
      SQL_ECHO: ${SQL_ECHO:-false}
      # SQLAlchemy create_all() for missing tables; set false if you manage models yourself
      AUTO_CREATE_MODELS: ${AUTO_CREATE_MODELS:-true}
      AUTO_SEED_DATA_ON_STARTUP: ${AUTO_SEED_DATA_ON_STARTUP:-true}
    ports:
      - "8000:8000"
    networks:
      - fedrl_network
    volumes:
      - .:/app

  # ── Pretrain UI service ─────────────────────────────────────────────────────
  pretrain-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.pretrain
    container_name: fedrl_pretrain_dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fedrl}:${POSTGRES_PASSWORD:-fedrl}@postgres:5432/${POSTGRES_DB:-fedrl}
      SQL_ECHO: ${SQL_ECHO:-false}
    ports:
      - "8010:8010"
    networks:
      - fedrl_network
    volumes:
      - .:/app
      - ./pretrain/training_data:/app/pretrain/training_data

volumes:
  postgres_data:

networks:
  fedrl_network:
    driver: bridge