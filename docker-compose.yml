services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fedrl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fedrl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fedrl}
      POSTGRES_DB: ${POSTGRES_DB:-fedrl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fedrl} -d ${POSTGRES_DB:-fedrl}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fedrl_network

  # ── FastAPI server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fedrl_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fedrl}:${POSTGRES_PASSWORD:-fedrl}@postgres:5432/${POSTGRES_DB:-fedrl}
      CATALOGUE_VERSION: ${CATALOGUE_VERSION:-2026-01-01T00:00:00Z}
      SQL_ECHO: ${SQL_ECHO:-false}
    ports:
      - "8000:8000"
    networks:
      - fedrl_network
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── pgAdmin (optional — remove if not needed) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fedrl_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@fedrl.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    networks:
      - fedrl_network

volumes:
  postgres_data:

networks:
  fedrl_network:
    driver: bridge